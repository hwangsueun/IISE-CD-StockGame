<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>주식게임 — 경조사 이벤트 · 결혼식 초대</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/quiple/galmuri/dist/galmuri.css" />
<style>
  :root {
    --bg-deep: #1a0f0a;
    --frame: #2a1a10;
    --ink: #f4e4cc;
    --ink-dim: #c9a888;
    --ink-faint: #7c5040;
    --gold: #f5c542;
    --gold-dark: #b8862a;
    --green: #4ade80;
    --green-dark: #166534;
    --red: #ef4444;
    --red-bright: #ff5a4a;
    --red-dark: #7f1d1d;
    /* wedding warm accents */
    --rose: #ff9ec4;
    --rose-deep: #b8527e;
    --rose-dark: #4a1c30;
    --cream: #fff3df;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #050201;
    font-family: 'Galmuri11', monospace;
    color: var(--ink);
    overflow: hidden;
    image-rendering: pixelated;
    -webkit-font-smoothing: none;
  }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
    background: radial-gradient(ellipse at center, #1a1008 0%, #050201 78%), #050201;
  }

  /* ========== game frame ========== */
  .game {
    position: relative;
    width: 1280px; height: 820px;
    background: #000;
    border: 6px solid var(--frame);
    box-shadow:
      0 0 0 2px #000, 0 0 0 6px #2a1a10, 0 0 0 8px #000,
      0 24px 60px rgba(0,0,0,0.7),
      0 0 80px rgba(245,197,66,0.16);
    image-rendering: pixelated;
    overflow: hidden;
  }

  /* ---- wedding hall background ---- */
  .room {
    position: absolute; inset: 0; z-index: 0;
    background: #d8cfc4;
    background-image: url("assets/bg_wedding.png");
    background-size: cover;
    background-position: center 28%;
    image-rendering: pixelated;
    filter: brightness(0.86) saturate(1.05);
  }
  /* warm light wash + vignette so dark UI reads on top */
  .room::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 55% 42% at 50% 30%, rgba(255,236,200,0.34), transparent 72%),
      radial-gradient(ellipse 90% 72% at 50% 62%, transparent 28%, rgba(26,12,6,0.6) 100%),
      linear-gradient(180deg, rgba(26,16,8,0.18) 0%, rgba(26,16,8,0.55) 66%, rgba(12,6,2,0.82) 100%);
  }
  .room::after {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 38px, rgba(0,0,0,0.12) 38px 39px);
    mix-blend-mode: multiply; opacity: 0.5;
  }

  /* title plate / nav */
  .title-plate {
    position: absolute; top: -28px; left: 24px;
    background: #1c1208; border: 3px solid var(--gold-dark);
    padding: 4px 10px;
    font-family: 'Press Start 2P', monospace; font-size: 10px;
    color: var(--gold); letter-spacing: 2px; z-index: 200;
    text-shadow: 0 0 6px rgba(245,197,66,0.5);
  }
  .nav-strip {
    position: absolute; top: -28px; right: 24px;
    display: flex; gap: 6px; z-index: 200;
  }
  .nav-strip button {
    background: #1c1208; border: 3px solid var(--gold-dark);
    padding: 4px 10px;
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    color: var(--ink-dim); letter-spacing: 1px; cursor: pointer;
  }
  .nav-strip button:hover { color: var(--gold); }

  /* CRT */
  .crt {
    position: absolute; inset: 0; pointer-events: none; z-index: 100;
    background:
      radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.62) 100%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.0) 0 2px, rgba(0,0,0,0.10) 2px 3px);
    mix-blend-mode: multiply;
  }
  .crt::after {
    content: ""; position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0.0) 0 3px, rgba(255,255,255,0.02) 3px 4px);
    mix-blend-mode: overlay;
  }

  /* screen indicator */
  .screen-tag {
    position: absolute; top: 18px; left: 22px;
    display: flex; align-items: center; gap: 10px; z-index: 30;
  }
  .screen-tag .num {
    background: var(--gold); color: #1c1208;
    font-family: 'Press Start 2P', monospace; font-size: 10px;
    padding: 4px 8px; border: 2px solid #000; letter-spacing: 1px;
  }
  .screen-tag .nm {
    background: #1c1208; border: 2px solid var(--gold-dark);
    box-shadow: 2px 2px 0 #000;
    color: var(--ink); padding: 4px 10px;
    font-family: 'Galmuri11', monospace; font-size: 13px; letter-spacing: 1px;
  }
  .screen-tag .step {
    margin-left: 6px;
    font-family: 'Press Start 2P', monospace; font-size: 9px;
    color: var(--gold); letter-spacing: 1px;
    text-shadow: 1px 1px 0 #000;
  }

  /* date badge top-right */
  .datebox {
    position: absolute; top: 16px; right: 22px; z-index: 30;
    background: #1c1208; border: 3px solid #000;
    box-shadow: inset 0 0 0 2px var(--gold-dark), 3px 3px 0 #000;
    padding: 8px 14px; text-align: center;
  }
  .datebox .ring {
    font-family: 'Press Start 2P', monospace; font-size: 13px; color: var(--rose);
    text-shadow: 0 0 6px rgba(255,158,196,0.5);
  }
  .datebox .lbl {
    display: block; margin-top: 4px;
    font-family: 'Press Start 2P', monospace; font-size: 7px;
    color: var(--ink-dim); letter-spacing: 1px;
  }

  /* stage */
  .stage {
    position: absolute; left: 0; right: 0; top: 0; bottom: 250px;
    display: flex; align-items: center; justify-content: center;
    padding: 78px 60px 16px; z-index: 5;
  }

  /* ---- invitation card ---- */
  .invite {
    width: 560px; max-width: 92%;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 30px, rgba(245,197,66,0.05) 30px 31px),
      #1c1208;
    border: 4px solid #000;
    box-shadow:
      inset 0 0 0 2px var(--gold-dark),
      inset 0 0 0 6px #281a0c,
      8px 8px 0 #000,
      0 0 34px rgba(245,197,66,0.20);
    padding: 26px 30px 28px; text-align: center; position: relative;
    animation: cardPop 280ms steps(5,end);
  }
  .invite::before {
    content: "INVITATION · 2026"; position: absolute; top: 12px; right: 18px;
    font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--ink-faint); letter-spacing: 2px;
  }
  .invite .rings {
    font-family: 'Press Start 2P', monospace; font-size: 26px; color: var(--rose);
    letter-spacing: 4px; text-shadow: 0 0 10px rgba(255,158,196,0.55); margin-bottom: 14px;
  }
  .invite .ttl {
    font-family: 'Galmuri11', monospace; font-size: 34px; color: var(--gold);
    letter-spacing: 6px; text-shadow: 3px 3px 0 #000; margin-bottom: 6px;
  }
  .invite .eng {
    font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--ink-dim);
    letter-spacing: 4px; margin-bottom: 18px;
  }
  .invite .divider {
    height: 0; border-top: 3px double var(--gold-dark); margin: 4px 0 18px;
  }
  .invite .body {
    font-family: 'Galmuri11', monospace; font-size: 17px; line-height: 1.85;
    color: var(--ink); letter-spacing: 0.5px; text-wrap: pretty; text-align: left;
  }
  .invite .body .row { display: flex; gap: 12px; align-items: flex-start; margin: 6px 0; }
  .invite .body .bullet { color: var(--rose); flex: none; }
  .invite .body .em { color: var(--gold); }
  .invite .body .red { color: var(--red-bright); }
  @keyframes cardPop { from { opacity:0; transform: translateY(16px) scale(.96);} to {opacity:1; transform:none;} }

  /* ---- celebration card ---- */
  .celebrate-card {
    width: 600px; max-width: 92%;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 30px, rgba(255,158,196,0.06) 30px 31px),
      #1c1208;
    border: 4px solid #000;
    box-shadow:
      inset 0 0 0 2px var(--rose-deep),
      inset 0 0 0 6px #2a1018,
      8px 8px 0 #000,
      0 0 36px rgba(255,158,196,0.26);
    padding: 26px 30px 26px; text-align: center; position: relative;
    animation: cardPop 280ms steps(5,end);
  }
  .celebrate-card::before {
    content: "JUST MARRIED · 2026"; position: absolute; top: 12px; right: 18px;
    font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--ink-faint); letter-spacing: 2px;
  }
  .celebrate-card .rings {
    font-family: 'Press Start 2P', monospace; font-size: 28px; color: var(--rose);
    letter-spacing: 6px; text-shadow: 0 0 12px rgba(255,158,196,0.6); margin-bottom: 12px;
    animation: ringPulse 0.9s steps(2,end) infinite;
  }
  @keyframes ringPulse { 0%,100%{opacity:1;} 50%{opacity:0.55;} }
  .celebrate-card .ttl {
    font-family: 'Galmuri11', monospace; font-size: 32px; color: var(--rose);
    letter-spacing: 6px; text-shadow: 3px 3px 0 #000; margin-bottom: 6px;
  }
  .celebrate-card .eng {
    font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--ink-dim);
    letter-spacing: 4px; margin-bottom: 16px;
  }
  .celebrate-card .divider {
    height: 0; border-top: 3px double var(--rose-deep); margin: 4px 0 18px;
  }
  .celebrate-card .cele-cap {
    font-family: 'Galmuri11', monospace; font-size: 19px; line-height: 1.75;
    color: var(--ink); letter-spacing: 0.5px; text-wrap: pretty; min-height: 70px;
    display: flex; align-items: center; justify-content: center;
  }
  .celebrate-card .cele-cap .em { color: var(--gold); }
  .celebrate-card .cele-cap .rose { color: var(--rose); }
  .celebrate-card .confetti {
    margin-top: 18px;
    font-family: 'Press Start 2P', monospace; font-size: 13px; color: var(--gold);
    letter-spacing: 8px; text-shadow: 0 0 8px rgba(245,197,66,0.5);
    animation: confettiBob 0.8s steps(2,end) infinite;
  }
  @keyframes confettiBob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-3px);} }

  /* ---- choice buttons ---- */
  .choices {
    position: absolute; left: 0; right: 0; bottom: 280px;
    display: flex; justify-content: center; gap: 26px; z-index: 7;
    opacity: 0; pointer-events: none; transition: opacity 240ms steps(4,end);
  }
  .choices.show { opacity: 1; pointer-events: all; }
  .choice-btn {
    min-width: 280px;
    border: 4px solid #000; cursor: pointer;
    padding: 16px 24px;
    font-family: 'Galmuri11', monospace; letter-spacing: 3px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: transform 90ms steps(2,end);
  }
  .choice-btn .key {
    font-family: 'Press Start 2P', monospace; font-size: 9px; letter-spacing: 1px;
  }
  .choice-btn .name { font-size: 22px; font-weight: bold; }
  .choice-btn .hint { font-family: 'Press Start 2P', monospace; font-size: 7px; letter-spacing: 1px; }
  .choice-btn:hover { transform: translate(-1px,-2px); }
  .choice-btn:active { transform: translate(2px,2px); }
  .choice-btn.attend {
    background: var(--gold); color: #1c1208;
    box-shadow: inset 0 0 0 2px #ffe9a8, inset 0 -7px 0 var(--gold-dark), 5px 5px 0 #000;
  }
  .choice-btn.attend .key, .choice-btn.attend .hint { color: var(--gold-dark); }
  .choice-btn.attend:hover { background: #ffd968; }
  .choice-btn.decline {
    background: #2a1a10; color: var(--ink);
    box-shadow: inset 0 0 0 2px var(--ink-faint), inset 0 -7px 0 #120a04, 5px 5px 0 #000;
  }
  .choice-btn.decline .key { color: var(--rose); }
  .choice-btn.decline .hint { color: var(--ink-dim); }
  .choice-btn.decline:hover { background: #3a2616; }

  /* ---- result card ---- */
  .result-card {
    width: 720px; max-width: 94%;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 30px, rgba(245,197,66,0.05) 30px 31px),
      #1c1208;
    border: 4px solid #000;
    box-shadow:
      inset 0 0 0 2px var(--gold-dark),
      inset 0 0 0 6px #281a0c,
      8px 8px 0 #000,
      0 0 34px rgba(245,197,66,0.20);
    padding: 20px 28px 24px; position: relative;
    animation: cardPop 280ms steps(5,end);
  }
  .result-card::before {
    content: "RECEIPT · NO. 2026-0424"; position: absolute; top: 10px; right: 20px;
    font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--ink-faint); letter-spacing: 2px;
  }
  .rc-head {
    text-align: center; padding-bottom: 14px; margin-bottom: 8px;
    border-bottom: 3px double var(--gold-dark);
  }
  .rc-head .rings {
    display: inline-block; color: var(--rose); font-family: 'Press Start 2P', monospace;
    font-size: 16px; margin-bottom: 10px; letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(255,158,196,0.5);
  }
  .rc-head .ttl {
    font-family: 'Press Start 2P', monospace; font-size: 15px;
    color: var(--gold); letter-spacing: 3px; text-shadow: 2px 2px 0 #000;
  }
  .rc-head .sub {
    font-family: 'Galmuri11', monospace; font-size: 13px;
    color: var(--ink-dim); letter-spacing: 1px; margin-top: 8px;
  }
  .rc-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 13px 4px; border-bottom: 1px dashed #3a2616;
  }
  .rc-row .k {
    font-family: 'Galmuri11', monospace; font-size: 17px; color: var(--ink-dim); letter-spacing: 1px;
  }
  .rc-row .k small {
    display: block; font-family: 'Press Start 2P', monospace; font-size: 7px;
    color: var(--ink-faint); letter-spacing: 2px; margin-top: 4px;
  }
  .rc-row .v {
    font-family: 'Galmuri11', monospace; font-size: 20px; color: var(--ink);
    font-variant-numeric: tabular-nums; letter-spacing: 1px; text-align: right;
  }
  .rc-row .v.gold { color: var(--gold); font-weight: bold; }
  .rc-row .v.up   { color: var(--red-bright); font-weight: bold; }
  .rc-row .v.down { color: var(--green); font-weight: bold; }
  .rc-row .v .arrow { color: var(--ink-faint); margin: 0 8px; font-family: 'Press Start 2P', monospace; font-size: 11px; }
  .rc-row.result {
    border-bottom: none; padding-top: 14px;
  }
  .rc-row.result .v {
    font-size: 16px; max-width: 62%; line-height: 1.55; text-wrap: pretty;
  }
  .rc-row.result .v.up   { color: var(--red-bright); }
  .rc-row.result .v.down { color: var(--green); }

  /* ---- confirm button ---- */
  .confirm-strip {
    position: absolute; left: 0; right: 0; bottom: 280px;
    display: flex; justify-content: center; z-index: 7;
  }
  .confirm-btn {
    background: var(--gold);
    border: 4px solid #000;
    box-shadow: inset 0 0 0 2px #ffe9a8, inset 0 -7px 0 var(--gold-dark), 5px 5px 0 #000;
    padding: 16px 56px; cursor: pointer;
    font-family: 'Galmuri11', monospace; font-size: 22px; color: #1c1208;
    letter-spacing: 6px; font-weight: bold;
  }
  .confirm-btn:hover { background: #ffd968; transform: translate(-1px,-1px); }
  .confirm-btn:active { transform: translate(2px,2px); box-shadow: inset 0 0 0 2px #ffe9a8, inset 0 -3px 0 var(--gold-dark), 2px 2px 0 #000; }
  .confirm-btn .arr { font-family: 'Press Start 2P', monospace; font-size: 14px; margin-right: 12px; }

  /* ========== narration ========== */
  .narration {
    position: absolute; left: 30px; right: 30px; bottom: 30px;
    background: #1c1208;
    border: 4px solid #000;
    box-shadow: inset 0 0 0 2px var(--gold-dark), inset 0 0 0 6px #281a0c, 6px 6px 0 #000;
    padding: 16px 22px 18px; z-index: 8; height: 200px;
    display: flex; flex-direction: column;
  }
  .nar-head {
    display: flex; align-items: center; gap: 10px;
    border-bottom: 2px dashed #3a2616; padding-bottom: 8px; margin-bottom: 10px;
  }
  .nar-portrait {
    width: 42px; height: 42px; background: #281a0c; border: 2px solid #000;
    box-shadow: inset 0 0 0 1px var(--gold-dark);
    display: grid; place-items: center;
    font-family: 'Press Start 2P', monospace; font-size: 16px; color: var(--gold);
  }
  .nar-name { font-family: 'Galmuri11', monospace; font-size: 18px; color: var(--gold); letter-spacing: 1px; }
  .nar-tag {
    font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--ink-dim);
    letter-spacing: 1px; border: 1px solid var(--gold-dark); padding: 2px 6px;
  }
  .nar-prog { margin-left: auto; font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--ink-dim); letter-spacing: 1px; }
  .nar-prog b { color: var(--gold); }
  .nar-body {
    flex: 1; font-family: 'Galmuri11', monospace; font-size: 20px; line-height: 1.6;
    color: var(--ink); text-wrap: pretty; letter-spacing: 0.5px; overflow: hidden;
  }
  .nar-body .em  { color: var(--gold); }
  .nar-body .rose { color: var(--rose); }
  .nar-body .red { color: var(--red-bright); }
  .nar-body .green { color: var(--green); }
  .nar-body .cursor {
    display: inline-block; width: 10px; height: 19px; background: var(--gold);
    vertical-align: -3px; margin-left: 4px; animation: blinkFast 0.55s steps(2,end) infinite;
  }
  @keyframes blinkFast { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
  .nar-next {
    position: absolute; right: 22px; bottom: 18px;
    font-family: 'Press Start 2P', monospace; font-size: 12px; color: var(--gold);
    letter-spacing: 2px; animation: nextBob 0.7s steps(2,end) infinite; user-select: none;
  }
  @keyframes nextBob { 0%,100%{transform:translateX(0);} 50%{transform:translateX(4px);} }

  /* fade mask */
  .fade-mask {
    position: absolute; inset: 0; background: #000; z-index: 90;
    pointer-events: none; opacity: 1; transition: opacity 420ms steps(6,end);
  }
  .fade-mask.off { opacity: 0; }
  .fade-mask.on  { opacity: 1; pointer-events: all; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="game" id="game" data-screen-label="경조사 이벤트 · 결혼식 초대">
  <div class="title-plate">♥ 경조사 이벤트 ♥</div>
  <div class="nav-strip">
    <button id="replayBtn" title="처음부터 다시보기">↺ 다시보기</button>
  </div>

  <div class="room" id="room"></div>

  <div class="datebox">
    <span class="ring">◎◎</span>
    <span class="lbl">WEDDING</span>
  </div>

  <div class="screen-tag">
    <span class="num" id="tagNum">W1</span>
    <span class="nm" id="tagName">결혼식 초대</span>
    <span class="step" id="tagStep">STEP 1 / 2</span>
  </div>

  <div class="stage" id="stage"></div>

  <div class="choices" id="choices"></div>
  <div class="confirm-strip hidden" id="confirmStrip"></div>

  <div class="narration" id="narration" hidden>
    <div class="nar-head">
      <div class="nar-portrait" id="narPortrait">♥</div>
      <span class="nar-name" id="narName">시스템</span>
      <span class="nar-tag" id="narTag">SYSTEM</span>
      <span class="nar-prog">STEP <b id="narStep">1</b> / 2</span>
    </div>
    <div class="nar-body" id="narBody"></div>
    <div class="nar-next" id="narNext">▶ 계속</div>
  </div>

  <div class="fade-mask on" id="fade"></div>
  <div class="crt"></div>
</div>

<script>
  // ============================================================
  //  WEDDING EVENT — display only.
  //  No state, no storage, no money deduction, no navigation.
  // ============================================================
  const fmt = n => Math.abs(n).toLocaleString('ko-KR') + '원';

  // result text variants for attending (random preview — both reachable)
  const ATTEND_STRESS = {
    up: {
      change: '스트레스 ▲ 증가',
      reason: '사람이 많고 어색한 대화가 이어져 피로함.',
      result: '낯선 사람들 사이에서 불편함을 느꼈다.'
    },
    down: {
      change: '스트레스 ▼ 감소',
      reason: '축하 인사를 받고 따뜻한 분위기 속에서 잠시 기분이 좋아짐.',
      result: '감사 인사를 받고 마음이 편해졌다.'
    }
  };

  let choice = null;          // 'attend' | 'decline'
  let attendOutcome = null;   // 'up' | 'down'
  let locked = false;
  let typingFn = null;
  let phase = 'choice';       // 'choice' | 'celebrate' | 'result'
  let celebrateLines = [];
  let celebrateIdx = 0;

  const stage   = () => document.getElementById('stage');
  const choices = () => document.getElementById('choices');
  const confirm = () => document.getElementById('confirmStrip');
  const narEl   = () => document.getElementById('narration');

  // ============================================================
  //  STEP 1 — invitation + choice
  // ============================================================
  function renderInvite() {
    stage().innerHTML = `
      <div class="invite">
        <div class="rings">◎◎</div>
        <div class="ttl">결혼식 초대</div>
        <div class="eng">WEDDING INVITATION</div>
        <div class="divider"></div>
        <div class="body">
          <div class="row"><span class="bullet">♥</span><span>지인의 <span class="em">결혼식 초대장</span>이 도착했습니다.</span></div>
          <div class="row"><span class="bullet">♥</span><span>참석하면 <span class="em">경조사비</span>를 지불합니다.</span></div>
          <div class="row"><span class="bullet">♥</span><span>불참하면 돈은 아끼지만 <span class="red">스트레스가 증가</span>합니다.</span></div>
        </div>
      </div>`;
  }
  function renderChoices() {
    const c = choices();
    c.innerHTML = `
      <button type="button" class="choice-btn attend" data-choice="attend">
        <span class="key">［ 1 ］</span>
        <span class="name">참석한다</span>
        <span class="hint">- 100,000 WON</span>
      </button>
      <button type="button" class="choice-btn decline" data-choice="decline">
        <span class="key">［ 2 ］</span>
        <span class="name">불참한다</span>
        <span class="hint">STRESS UP</span>
      </button>`;
    c.querySelectorAll('.choice-btn').forEach(b => {
      b.addEventListener('click', e => {
        e.stopPropagation();
        pick(b.dataset.choice);
      });
    });
  }

  function pick(which) {
    if (locked) return;
    choice = which;
    c_off();
    if (which === 'attend') {
      // random stress preview — display only
      attendOutcome = Math.random() < 0.5 ? 'up' : 'down';
      goCelebration();
    } else {
      phase = 'result';
      goResult();
    }
  }
  function c_off() { choices().classList.remove('show'); }

  // ============================================================
  //  STEP 1.5 — wedding celebration (attend only, display only)
  // ============================================================
  function renderCelebration() {
    stage().innerHTML = `
      <div class="celebrate-card">
        <div class="rings">◎◎</div>
        <div class="ttl">결혼 축하해!</div>
        <div class="eng">WEDDING CELEBRATION</div>
        <div class="divider"></div>
        <div class="cele-cap" id="celeCap"></div>
        <div class="confetti">♥ ◎ ♪ ♥ ◎ ♪ ♥</div>
      </div>`;
  }

  function playCelebrateLine() {
    const line = celebrateLines[celebrateIdx];
    const cap = document.getElementById('celeCap');
    if (cap) cap.innerHTML = line.caption;
    narration(true, { who:'시스템', portrait:'♥', tag:'CELEBRATION', text: line.text });
  }

  function advanceCelebrate() {
    celebrateIdx++;
    if (celebrateIdx < celebrateLines.length) {
      playCelebrateLine();
    } else {
      phase = 'result';
      goResult();
    }
  }

  function goCelebration() {
    const fade = document.getElementById('fade');
    fade.classList.remove('off'); fade.classList.add('on');
    setTimeout(() => {
      document.getElementById('tagNum').textContent  = 'W♥';
      document.getElementById('tagName').textContent = '결혼식 축하 시간';
      document.getElementById('tagStep').textContent = 'CELEBRATION';
      document.getElementById('narStep').textContent = '♥';
      // invitation/choice card disappears — show only the dialogue
      stage().innerHTML = '';
      phase = 'celebrate';
      celebrateIdx = 0;
      celebrateLines = [
        {
          caption: '예식장 입구에 도착했다.',
          text: '예식장에 도착했습니다. 입구에서 <span class="rose">신랑신부의 환한 미소</span>가 보입니다.'
        },
        {
          caption: '“결혼 축하해, 행복하게 잘 살아!”',
          text: '축의금을 전하며 두 사람에게 <span class="em">“결혼 축하해! 두 사람 정말 잘 어울린다”</span>라고 진심으로 인사를 건넸습니다.'
        },
        {
          caption: '함께 사진도 찍고, 잠시 즐거운 시간.',
          text: '식이 끝나고 <span class="rose">함께 사진도 찍고</span> 맛있는 식사를 하며 잠시 즐거운 축하의 시간을 보냈습니다.'
        },
        {
          caption: '진심으로 축하를 전했다.',
          text: '두 사람의 행복을 진심으로 축하하며, 따뜻한 마음으로 <span class="rose">축하의 자리</span>를 마무리했습니다.'
        }
      ];
      playCelebrateLine();
      fade.classList.remove('on'); fade.classList.add('off');
    }, 220);
  }

  // ============================================================
  //  STEP 2 — result card
  // ============================================================
  function buildResultData() {
    if (choice === 'attend') {
      const o = ATTEND_STRESS[attendOutcome];
      return {
        choiceLabel: '참석한다',
        fee: 100000,
        changeText: o.change,
        changeCls: attendOutcome === 'up' ? 'up' : 'down',
        resultText: o.reason + ' ' + o.result,
        resultCls: attendOutcome === 'up' ? 'up' : 'down'
      };
    }
    return {
      choiceLabel: '불참한다',
      fee: 0,
      changeText: '스트레스 ▲ 증가',
      changeCls: 'up',
      resultText: '돈은 아꼈지만 마음이 불편해 스트레스가 증가했습니다.',
      resultCls: 'up'
    };
  }

  function renderResult() {
    const d = buildResultData();
    const feeStr = d.fee === 0 ? '0원' : '- ' + fmt(d.fee);
    const feeCls = d.fee === 0 ? 'gold' : '';
    stage().innerHTML = `
      <div class="result-card">
        <div class="rc-head">
          <div class="rings">◎◎</div>
          <div class="ttl">경조사 결과</div>
          <div class="sub">WEDDING · 결혼식 초대 정산</div>
        </div>
        <div class="rc-row">
          <span class="k">선택<small>CHOICE</small></span>
          <span class="v gold">${d.choiceLabel}</span>
        </div>
        <div class="rc-row">
          <span class="k">경조사비<small>GIFT MONEY</small></span>
          <span class="v ${feeCls}">${feeStr}</span>
        </div>
        <div class="rc-row">
          <span class="k">스트레스 변화<small>STRESS</small></span>
          <span class="v ${d.changeCls}">${d.changeText}</span>
        </div>
        <div class="rc-row result">
          <span class="k">결과<small>OUTCOME</small></span>
          <span class="v ${d.resultCls}">${d.resultText}</span>
        </div>
      </div>`;
  }

  function goResult() {
    const fade = document.getElementById('fade');
    fade.classList.remove('off'); fade.classList.add('on');
    setTimeout(() => {
      document.getElementById('tagNum').textContent  = 'W2';
      document.getElementById('tagName').textContent = '결과';
      document.getElementById('tagStep').textContent = 'STEP 2 / 2';
      document.getElementById('narStep').textContent = '2';
      renderResult();
      const d = buildResultData();
      const tone = d.resultCls === 'up'
        ? '<span class="red">스트레스가 증가</span>했습니다.'
        : '<span class="green">기분이 한결 나아졌습니다.</span>';
      narration(true, { who:'시스템', portrait:'♥', tag:'RESULT',
        text:`<span class="em">${d.choiceLabel}</span>를 선택했습니다. 아래 내역을 확인하세요. ${tone}` });
      fade.classList.remove('on'); fade.classList.add('off');
    }, 220);
  }

  // ============================================================
  //  UI HELPERS
  // ============================================================
  function narration(show, info) {
    const el = narEl();
    el.hidden = !show;
    if (show && info) {
      document.getElementById('narPortrait').textContent = info.portrait || '♥';
      document.getElementById('narName').textContent = info.who;
      document.getElementById('narTag').textContent  = info.tag || 'SYSTEM';
      typeWriter(info.text);
    }
  }
  function typeWriter(html) {
    locked = true;
    document.getElementById('narNext').style.display = 'none';
    const body = document.getElementById('narBody');
    body.innerHTML = '';
    const root = document.createElement('span');
    body.appendChild(root);
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    body.appendChild(cursor);
    let i = 0, buf = '';
    const src = html;
    let cancelled = false;
    const finish = () => {
      root.innerHTML = src; cursor.remove(); locked = false;
      document.getElementById('narNext').style.display = '';
      if (typeof onTypedDone === 'function') onTypedDone();
      typingFn = null;
    };
    typingFn = () => { cancelled = true; finish(); };
    function tick() {
      if (cancelled) return;
      if (i >= src.length) { finish(); return; }
      if (src[i] === '<') {
        const close = src.indexOf('>', i);
        buf += src.slice(i, close+1); i = close + 1;
      } else { buf += src[i++]; }
      root.innerHTML = buf;
      setTimeout(tick, 26);
    }
    tick();
  }

  // after the narration finishes typing, reveal the relevant control
  function onTypedDone() {
    if (phase === 'choice') {
      // step 1 — show choice buttons
      choices().classList.add('show');
    } else if (phase === 'celebrate') {
      // celebration — wait for click to advance (▶ 계속 shown by typeWriter)
    } else {
      // step 2 — show confirm button
      showConfirm();
    }
  }

  function showConfirm() {
    const wrap = confirm();
    wrap.classList.remove('hidden');
    wrap.innerHTML = '';
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'confirm-btn';
    btn.innerHTML = `<span class="arr">▶</span>확인`;
    // display-only: does nothing for now (no nav, no state change).
    btn.addEventListener('click', e => {
      e.stopPropagation();
      btn.style.pointerEvents = 'none';
      btn.style.opacity = '0.55';
      btn.innerHTML = `확인됨`;
    });
    wrap.appendChild(btn);
  }

  // ============================================================
  //  CONTROL
  // ============================================================
  // clicking the frame: skip typing only (advancing is via buttons)
  document.getElementById('game').addEventListener('click', e => {
    if (e.target.closest('.choice-btn')) return;
    if (e.target.closest('.confirm-btn')) return;
    if (e.target.closest('.nav-strip')) return;
    if (locked && typingFn) { typingFn(); return; }
    if (phase === 'celebrate' && !locked) advanceCelebrate();
  });

  // keyboard shortcuts for choices (step 1 only)
  document.addEventListener('keydown', e => {
    if (choice !== null || locked) return;
    if (e.key === '1') pick('attend');
    if (e.key === '2') pick('decline');
  });

  document.getElementById('replayBtn').addEventListener('click', e => {
    e.stopPropagation();
    start();
  });

  function start() {
    choice = null;
    attendOutcome = null;
    locked = false;
    phase = 'choice';
    celebrateLines = [];
    celebrateIdx = 0;
    choices().classList.remove('show');
    choices().innerHTML = '';
    confirm().classList.add('hidden');
    confirm().innerHTML = '';
    document.getElementById('tagNum').textContent  = 'W1';
    document.getElementById('tagName').textContent = '결혼식 초대';
    document.getElementById('tagStep').textContent = 'STEP 1 / 2';
    document.getElementById('narStep').textContent = '1';
    const fade = document.getElementById('fade');
    fade.classList.add('on'); fade.classList.remove('off');
    narEl().hidden = true;
    stage().innerHTML = '';
    setTimeout(() => {
      renderInvite();
      renderChoices();
      narration(true, { who:'시스템', portrait:'♥', tag:'EVENT',
        text:'<span class="rose">경조사 이벤트 발생.</span> 지인의 결혼식 초대장이 도착했습니다. 참석 여부를 선택하세요.' });
      fade.classList.remove('on'); fade.classList.add('off');
    }, 260);
  }

  start();
</script>
